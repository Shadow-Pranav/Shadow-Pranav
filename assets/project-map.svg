  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="64" y="330" width="1072" height="48" rx="18" fill="#020617" fill-opacity="0.64" stroke="#334155" stroke-opacity="0.8"/>
    <text x="92" y="361" font-size="16" fill="#cbd5e1">Positioning:</text>
    <text x="184" y="361" font-size="16" font-weight="700" fill="#f8fafc">AI-enabled business software</text>
    <text x="412" y="361" font-size="16" fill="#64748b">•</text>
    <text x="434" y="361" font-size="16" font-weight="700" fill="#f8fafc">backend + databases</text>
    <text x="606" y="361" font-size="16" fill="#64748b">•</text>
    <text x="628" y="361" font-size="16" font-weight="700" fill="#f8fafc">ML services</text>
