      <text x="30" y="45" font-size="21" font-weight="800" fill="#fce7f3">5</text>
      <text x="24" y="82" font-size="21" font-weight="800" fill="#f8fafc">Expense</text>
      <text x="24" y="111" font-size="14" fill="#94a3b8">Finance UI</text>
