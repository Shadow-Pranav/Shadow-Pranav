      <circle cx="38" cy="38" r="18" fill="#1e1b4b" stroke="#818cf8"/>
      <text x="30" y="45" font-size="21" font-weight="800" fill="#e0e7ff">2</text>
      <text x="24" y="82" font-size="21" font-weight="800" fill="#f8fafc">PulseShield</text>
      <text x="24" y="111" font-size="14" fill="#94a3b8">Fraud detection</text>
      <text x="24" y="135" font-size="13" fill="#c4b5fd">Node • Flask • MySQL</text>
    </g>
    <g transform="translate(538 130)">
      <rect width="198" height="150" rx="22" fill="#07111f" stroke="#22c55e" stroke-opacity="0.65"/>
      <circle cx="38" cy="38" r="18" fill="#052e16" stroke="#22c55e"/>
      <text x="30" y="45" font-size="21" font-weight="800" fill="#dcfce7">3</text>
      <text x="24" y="82" font-size="21" font-weight="800" fill="#f8fafc">Inventory</text>
      <text x="24" y="111" font-size="14" fill="#94a3b8">Operations system</text>
      <text x="24" y="135" font-size="13" fill="#86efac">Django • RBAC • SQL</text>
    </g>
    <g transform="translate(772 130)">
