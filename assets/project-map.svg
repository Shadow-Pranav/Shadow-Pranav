<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio Project Map</title>
  <desc id="desc">A custom project map showing Pranav Dubey's GitHub portfolio across ERP automation, fraud detection, inventory systems, data apps, and frontend tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="edge" x1="160" y1="210" x2="1040" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="30" fill="url(#bg)"/>
  <path d="M60 345C230 240 350 372 516 255C680 138 812 241 948 138C1047 63 1129 101 1166 132" stroke="#334155" stroke-width="2" stroke-opacity="0.55"/>
  <path d="M160 210H1040" stroke="url(#edge)" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 16"/>

  <text x="64" y="60" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" fill="#f8fafc">Portfolio Map</text>
  <text x="64" y="92" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#94a3b8">Practical projects moving from UI prototypes to backend systems, databases, AI services, and business automation.</text>

