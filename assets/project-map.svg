      <circle cx="38" cy="38" r="18" fill="#082f49" stroke="#38bdf8"/>
      <text x="30" y="45" font-size="21" font-weight="800" fill="#e0f2fe">1</text>
      <text x="24" y="82" font-size="21" font-weight="800" fill="#f8fafc">Nexus SAP</text>
      <text x="24" y="111" font-size="14" fill="#94a3b8">ERP + IRIS AI</text>
      <text x="24" y="135" font-size="13" fill="#67e8f9">FastAPI • PyQt6 • ML</text>
    </g>
    <g transform="translate(304 130)">
