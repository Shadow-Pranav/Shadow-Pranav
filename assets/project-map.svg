      <circle cx="38" cy="38" r="18" fill="#451a03" stroke="#f59e0b"/>
      <text x="30" y="45" font-size="21" font-weight="800" fill="#fef3c7">4</text>
      <text x="24" y="82" font-size="21" font-weight="800" fill="#f8fafc">AI News</text>
      <text x="24" y="111" font-size="14" fill="#94a3b8">Data app</text>
      <text x="24" y="135" font-size="13" fill="#fde68a">Streamlit • Pandas</text>
