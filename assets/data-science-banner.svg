<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pranav Dubey Data Science Banner</title>
  <desc id="desc">Dark professional data science banner with analytics dashboard, machine learning nodes, and database visual elements.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.46" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 120) rotate(35) scale(390 210)">
      <stop stop-color="#38bdf8" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(970 210) rotate(135) scale(420 240)">
      <stop stop-color="#8b5cf6" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="80" y1="80" x2="1120" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#334155" stroke-opacity="0.22" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="34" fill="url(#grid)"/>
  <rect width="1200" height="360" rx="34" fill="url(#cyanGlow)"/>
  <rect width="1200" height="360" rx="34" fill="url(#violetGlow)"/>

  <g transform="translate(70 70)" filter="url(#shadow)">
    <rect width="650" height="220" rx="28" fill="#020617" fill-opacity="0.64" stroke="#334155"/>
    <text x="34" y="54" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#67e8f9" letter-spacing="5">DATA SCIENCE · ANALYTICS · ML</text>
    <text x="34" y="118" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="900" fill="#f8fafc">Pranav Dubey</text>
    <text x="36" y="160" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" fill="#cbd5e1">Python • SQL • Dashboards • ML APIs</text>
    <text x="36" y="194" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#94a3b8">Turning raw data into clean insights, models, and decision-ready applications.</text>
  </g>

  <g transform="translate(790 56)" filter="url(#shadow)">
    <rect width="330" height="248" rx="28" fill="#020617" fill-opacity="0.62" stroke="#475569"/>
    <text x="28" y="44" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#e2e8f0">ANALYTICS BOARD</text>
    <rect x="28" y="70" width="78" height="118" rx="12" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.45"/>
    <rect x="126" y="98" width="78" height="90" rx="12" fill="#0f172a" stroke="#a78bfa" stroke-opacity="0.45"/>
    <rect x="224" y="46" width="78" height="142" rx="12" fill="#0f172a" stroke="#22c55e" stroke-opacity="0.45"/>
    <path d="M28 218C63 184 91 204 126 170C167 130 198 156 224 118C258 68 284 82 302 60" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="28" cy="218" r="5" fill="#22d3ee"/>
    <circle cx="126" cy="170" r="5" fill="#a78bfa"/>
    <circle cx="224" cy="118" r="5" fill="#22c55e"/>
    <circle cx="302" cy="60" r="5" fill="#f8fafc"/>
    <text x="30" y="222" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#94a3b8">EDA</text>
    <text x="128" y="222" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#94a3b8">ML</text>
    <text x="226" y="222" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#94a3b8">BI</text>
  </g>

  <g transform="translate(82 316)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800">
    <rect x="0" y="-26" width="84" height="34" rx="17" fill="#082f49" stroke="#38bdf8" stroke-opacity="0.55"/>
    <text x="22" y="-4" fill="#e0f2fe">EDA</text>
    <rect x="100" y="-26" width="96" height="34" rx="17" fill="#1e1b4b" stroke="#a78bfa" stroke-opacity="0.55"/>
    <text x="123" y="-4" fill="#ede9fe">Pandas</text>
    <rect x="212" y="-26" width="74" height="34" rx="17" fill="#052e16" stroke="#22c55e" stroke-opacity="0.55"/>
    <text x="236" y="-4" fill="#dcfce7">SQL</text>
    <rect x="302" y="-26" width="110" height="34" rx="17" fill="#312e81" stroke="#818cf8" stroke-opacity="0.55"/>
    <text x="326" y="-4" fill="#e0e7ff">Models</text>
    <rect x="428" y="-26" width="120" height="34" rx="17" fill="#1e293b" stroke="#94a3b8" stroke-opacity="0.55"/>
    <text x="452" y="-4" fill="#e2e8f0">Dashboards</text>
  </g>
</svg>
