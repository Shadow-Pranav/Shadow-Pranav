<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pranav Dubey GitHub Profile Banner</title>
  <desc id="desc">A professional dark technology banner for AI, machine learning, full-stack systems, and ERP automation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.48" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(235 120) rotate(35) scale(360 190)">
      <stop stop-color="#22d3ee" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1010 210) rotate(135) scale(370 210)">
      <stop stop-color="#8b5cf6" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="120" y1="90" x2="890" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#334155" stroke-opacity="0.22" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="34" fill="url(#grid)"/>
  <rect width="1200" height="360" rx="34" fill="url(#glowA)"/>
  <rect width="1200" height="360" rx="34" fill="url(#glowB)"/>

  <g opacity="0.9" filter="url(#softShadow)">
    <path d="M815 78C890 38 1005 52 1071 128C1136 203 1111 289 1028 313C945 337 887 277 824 250C761 223 740 118 815 78Z" fill="#0b1220" stroke="#38bdf8" stroke-opacity="0.22"/>
    <circle cx="880" cy="125" r="9" fill="#22d3ee"/>
    <circle cx="1008" cy="128" r="7" fill="#818cf8"/>
    <circle cx="1034" cy="240" r="8" fill="#22c55e"/>
    <circle cx="890" cy="262" r="6" fill="#38bdf8"/>
    <path d="M880 125L1008 128L1034 240L890 262L880 125Z" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.76"/>
    <path d="M1008 128L890 262" stroke="#64748b" stroke-opacity="0.52" stroke-width="2"/>
  </g>

  <g transform="translate(72 72)">
    <rect x="0" y="0" width="634" height="216" rx="26" fill="#020617" fill-opacity="0.56" stroke="#334155" stroke-opacity="0.74"/>
    <text x="34" y="54" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" fill="#67e8f9" letter-spacing="4">AI-FIRST SOFTWARE ENGINEERING</text>
    <text x="34" y="113" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="800" fill="#f8fafc">Pranav Dubey</text>
    <text x="36" y="154" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" fill="#cbd5e1">Full-Stack • AI/ML • ERP Automation • Data Apps</text>
    <text x="36" y="189" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#94a3b8">Building practical systems that turn business workflows into clean, usable software.</text>
  </g>

  <g transform="translate(76 304)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    <rect x="0" y="-26" width="96" height="34" rx="17" fill="#082f49" stroke="#38bdf8" stroke-opacity="0.55"/>
    <text x="22" y="-4" fill="#e0f2fe">Python</text>
    <rect x="112" y="-26" width="96" height="34" rx="17" fill="#111827" stroke="#818cf8" stroke-opacity="0.55"/>
    <text x="137" y="-4" fill="#e0e7ff">FastAPI</text>
    <rect x="224" y="-26" width="82" height="34" rx="17" fill="#052e16" stroke="#22c55e" stroke-opacity="0.55"/>
    <text x="250" y="-4" fill="#dcfce7">Django</text>
    <rect x="322" y="-26" width="78" height="34" rx="17" fill="#312e81" stroke="#a78bfa" stroke-opacity="0.55"/>
    <text x="347" y="-4" fill="#ede9fe">ML</text>
    <rect x="416" y="-26" width="102" height="34" rx="17" fill="#1e293b" stroke="#94a3b8" stroke-opacity="0.55"/>
    <text x="441" y="-4" fill="#e2e8f0">Systems</text>
  </g>

  <g opacity="0.75">
    <circle cx="1134" cy="56" r="3" fill="#38bdf8"/>
    <circle cx="1159" cy="91" r="2" fill="#818cf8"/>
    <circle cx="1102" cy="106" r="2" fill="#22c55e"/>
    <circle cx="1049" cy="42" r="2" fill="#67e8f9"/>
    <path d="M1102 106L1134 56L1159 91" stroke="#64748b" stroke-opacity="0.5"/>
  </g>
</svg>
