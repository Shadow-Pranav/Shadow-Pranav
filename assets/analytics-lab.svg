<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Data Analytics Lab</title>
  <desc id="desc">A visual map of data science workflow areas: collection, cleaning, exploration, modeling, dashboards, and deployment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="line" x1="110" y1="215" x2="1090" y2="215" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1200" height="430" rx="30" fill="url(#bg)"/>
  <path d="M60 340C238 252 356 365 512 258C675 147 817 231 952 139C1040 79 1118 96 1160 126" stroke="#334155" stroke-opacity="0.55" stroke-width="2"/>
  <path d="M118 222H1082" stroke="url(#line)" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 16"/>

  <text x="64" y="62" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="900" fill="#f8fafc">Data Science Workflow</text>
  <text x="64" y="96" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#94a3b8">A practical pipeline: ask better questions, clean the data, extract insight, train models, and ship usable dashboards.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(70 148)">
      <rect width="170" height="150" rx="22" fill="#07111f" stroke="#38bdf8" stroke-opacity="0.66"/>
      <text x="24" y="44" font-size="18" font-weight="800" fill="#e0f2fe">01 · Collect</text>
      <text x="24" y="78" font-size="14" fill="#94a3b8">APIs, CSVs, SQL</text>
      <text x="24" y="104" font-size="14" fill="#94a3b8">raw events</text>
      <circle cx="132" cy="112" r="22" fill="#082f49" stroke="#38bdf8"/>
      <path d="M119 112H145M132 99V125" stroke="#e0f2fe" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g transform="translate(264 148)">
      <rect width="170" height="150" rx="22" fill="#07111f" stroke="#a78bfa" stroke-opacity="0.66"/>
      <text x="24" y="44" font-size="18" font-weight="800" fill="#ede9fe">02 · Clean</text>
      <text x="24" y="78" font-size="14" fill="#94a3b8">missing values</text>
      <text x="24" y="104" font-size="14" fill="#94a3b8">feature tables</text>
      <path d="M118 122C130 88 148 88 158 122" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
    </g>
    <g transform="translate(458 148)">
      <rect width="170" height="150" rx="22" fill="#07111f" stroke="#22c55e" stroke-opacity="0.66"/>
      <text x="24" y="44" font-size="18" font-weight="800" fill="#dcfce7">03 · Explore</text>
      <text x="24" y="78" font-size="14" fill="#94a3b8">EDA, charts</text>
      <text x="24" y="104" font-size="14" fill="#94a3b8">hypotheses</text>
      <rect x="112" y="92" width="10" height="38" rx="4" fill="#22c55e"/>
      <rect x="132" y="72" width="10" height="58" rx="4" fill="#38bdf8"/>
      <rect x="152" y="106" width="10" height="24" rx="4" fill="#a78bfa"/>
    </g>
    <g transform="translate(652 148)">
      <rect width="170" height="150" rx="22" fill="#07111f" stroke="#f59e0b" stroke-opacity="0.66"/>
      <text x="24" y="44" font-size="18" font-weight="800" fill="#fef3c7">04 · Model</text>
      <text x="24" y="78" font-size="14" fill="#94a3b8">classification</text>
      <text x="24" y="104" font-size="14" fill="#94a3b8">forecasting</text>
      <circle cx="118" cy="112" r="7" fill="#f59e0b"/><circle cx="150" cy="92" r="7" fill="#f59e0b"/><circle cx="148" cy="126" r="7" fill="#f59e0b"/>
      <path d="M118 112L150 92M118 112L148 126" stroke="#fef3c7" stroke-opacity="0.8"/>
    </g>
    <g transform="translate(846 148)">
      <rect width="170" height="150" rx="22" fill="#07111f" stroke="#ec4899" stroke-opacity="0.66"/>
      <text x="24" y="44" font-size="18" font-weight="800" fill="#fce7f3">05 · Visualize</text>
      <text x="24" y="78" font-size="14" fill="#94a3b8">dashboards</text>
      <text x="24" y="104" font-size="14" fill="#94a3b8">decision KPIs</text>
      <path d="M112 122C124 94 139 112 152 82" stroke="#ec4899" stroke-width="4" stroke-linecap="round"/>
    </g>
    <g transform="translate(1040 148)">
      <rect width="110" height="150" rx="22" fill="#07111f" stroke="#94a3b8" stroke-opacity="0.66"/>
      <text x="20" y="44" font-size="18" font-weight="800" fill="#e2e8f0">Ship</text>
      <text x="20" y="78" font-size="14" fill="#94a3b8">API</text>
      <text x="20" y="104" font-size="14" fill="#94a3b8">Docker</text>
      <text x="20" y="130" font-size="14" fill="#94a3b8">Docs</text>
    </g>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="64" y="345" width="1072" height="50" rx="18" fill="#020617" fill-opacity="0.68" stroke="#334155"/>
    <text x="92" y="377" font-size="16" fill="#94a3b8">Profile signal:</text>
    <text x="202" y="377" font-size="16" font-weight="800" fill="#f8fafc">Data analytics + ML-backed apps + business dashboards</text>
  </g>
</svg>
